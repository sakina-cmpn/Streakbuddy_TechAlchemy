<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>streak-Study</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1> Streak Buddy</h1>
      <button id="themeToggle">🌙</button>
    </div>

    <div class="stats">
      <p><strong>🔥 Streak:</strong> <span id="streakCount">0</span> days</p>
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>
      <p id="progressText">0% Completed</p>
    </div>

    <div class="add-habit">
      <input type="text" id="habitInput" placeholder="Enter a new habit..." />
      <button id="addBtn">Add Habit</button>
    </div>

    <ul id="habitList"></ul>

    <div class="quote-box">
      <p id="quote">“Small daily improvements lead to stunning results.”</p>
      <button id="newQuote">Get Motivation ✨</button>
    </div>
  </div>

  <script src="streak.js"></script>
</body>
</html>
