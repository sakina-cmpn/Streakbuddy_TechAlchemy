<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard - StreakBuddy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .leaderboard {
            width: 60%;
            margin: 30px auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        .user {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin: 10px 0;
            background: #334155;
            border-radius: 8px;
        }

        .rank {
            font-weight: bold;
        }

        .gold { color: gold; }
        .silver { color: silver; }
        .bronze { color: #cd7f32; }

        a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>🏆 Leaderboard</h1>

    <div class="leaderboard">

        <div class="user gold">
            <span class="rank">🥇 1</span>
            <span>Jhalak</span>
            <span>🔥 30 days</span>
        </div>

        <div class="user silver">
            <span class="rank">🥈 2</span>
            <span>Rahul</span>
            <span>🔥 25 days</span>
        </div>

        <div class="user bronze">
            <span class="rank">🥉 3</span>
            <span>Priya</span>
            <span>🔥 20 days</span>
        </div>

        <div class="user">
            <span class="rank">4</span>
            <span>Aman</span>
            <span>🔥 15 days</span>
        </div>

    </div>

    <br>
    <a href="dashboard.html">⬅ Back to Dashboard</a>

</body>
</html>
